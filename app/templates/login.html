{% extends "base.html" %}
{% block title %}{{ 'Register' if register else 'Login' }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-cyan-500 to-teal-500 shadow-lg shadow-cyan-500/25 mb-4">
                <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-teal-400 bg-clip-text text-transparent">
                OTMindset</h1>
            <p class="text-gray-500 text-sm mt-1 tracking-wider uppercase">OT Cybersecurity Intelligence</p>
        </div>

        <div class="gradient-border p-8" x-data="{ isRegister: {{ 'true' if register else 'false' }} }">
            <div class="card-accent card-accent-cyan"></div>
            <div class="flex bg-gray-900/50 rounded-lg p-1 mb-6">
                <button @click="isRegister = false"
                    :class="!isRegister ? 'bg-gray-800 text-cyan-400 shadow-lg' : 'text-gray-500 hover:text-gray-300'"
                    class="flex-1 py-2 text-sm font-semibold rounded-md transition-all duration-200">Sign In</button>
                <button @click="isRegister = true"
                    :class="isRegister ? 'bg-gray-800 text-cyan-400 shadow-lg' : 'text-gray-500 hover:text-gray-300'"
                    class="flex-1 py-2 text-sm font-semibold rounded-md transition-all duration-200">Register</button>
            </div>

            <!-- Login Form -->
            <form x-show="!isRegister" x-transition method="POST" action="{{ url_for('auth.login') }}"
                class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Username</label>
                    <input type="text" name="username" required autocomplete="username" class="cyber-input"
                        placeholder="Enter your username" id="login-username">
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Password</label>
                    <input type="password" name="password" required autocomplete="current-password" class="cyber-input"
                        placeholder="Enter your password" id="login-password">
                </div>
                <button type="submit" class="btn-analyze w-full text-center" id="login-submit">Authenticate</button>
            </form>

            <!-- Register Form -->
            <form x-show="isRegister" x-transition method="POST" action="{{ url_for('auth.register') }}"
                class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Username</label>
                    <input type="text" name="username" required class="cyber-input" placeholder="Choose a username"
                        id="reg-username">
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Email</label>
                    <input type="email" name="email" required class="cyber-input" placeholder="you@organization.com"
                        id="reg-email">
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Password</label>
                    <input type="password" name="password" required class="cyber-input"
                        placeholder="Min 8 chars, upper + lower + digit" id="reg-password">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1.5 tracking-wider uppercase">Confirm
                        Password</label>
                    <input type="password" name="confirm_password" required class="cyber-input"
                        placeholder="Repeat password" id="reg-confirm">
                </div>
                <button type="submit" class="btn-analyze w-full text-center" id="register-submit">Create
                    Account</button>
            </form>

            <div class="mt-6 pt-4 border-t border-gray-800/50">
                <p class="text-[11px] text-gray-600 text-center"> Secured session · CSRF protected · Encrypted storage
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
